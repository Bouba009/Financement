<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aitchikh Consulting | تمويل المشاريع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1e3a8a; /* أزرق بنكي رسمي */
            --accent-color: #d97706; /* برتقالي ذهبي */
            --bg-color: #f1f5f9;
            --text-color: #334155;
            --white: #ffffff;
            --success: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* --- تعديلات الهيدر لتحسين التناسق --- */
        header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: var(--white);
            /* زيادة التباعد الداخلي من الأسفل لترك مساحة للتداخل دون تغطية النص */
            padding: 4rem 1rem 8rem 1rem; 
            text-align: center;
            border-bottom: 6px solid var(--accent-color);
            position: relative;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3); /* ظل للنص لزيادة الوضوح */
        }

        header p {
            font-size: 1.3rem;
            opacity: 0.95;
            max-width: 600px;
            margin: 0 auto;
            color: #e2e8f0;
        }

        /* --- الحاوية الرئيسية --- */
        .container {
            max-width: 1100px;
            /* الهامش السلبي يسحب المحتوى للأعلى، لكن الآن الهيدر أطول فلا يغطي النص */
            margin: -5rem auto 2rem; 
            padding: 0 1.5rem;
            position: relative;
            z-index: 10;
        }
        
        /* تعديلات للموبايل لضمان عدم التداخل */
        @media (max-width: 768px) {
            header {
                padding-bottom: 5rem;
            }
            header h1 {
                font-size: 2rem;
            }
            .container {
                margin-top: -3rem; /* تقليل التداخل في الشاشات الصغيرة */
            }
        }

        /* Form */
        .consultation-form {
            background: var(--white);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
            background: #f8fafc;
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: var(--accent-color);
            background: #fff;
            outline: none;
        }

        .full-width { grid-column: 1 / -1; }

        .submit-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 1rem;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 2rem;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            background: #b45309;
            transform: translateY(-2px);
        }

        /* Loader */
        .loader {
            display: none;
            border: 4px solid #ffffff44;
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Results */
        #results-area { display: none; margin-top: 3rem; }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
        }

        .bank-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            transition: 0.3s;
        }

        .bank-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .bank-header {
            background: var(--primary-color);
            color: white;
            padding: 1.5rem;
            position: relative;
        }

        .bank-header h3 { font-size: 1.4rem; font-weight: 700; }
        .bank-header .tag {
            background: var(--accent-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
        }

        .bank-body { padding: 1.5rem; }

        .detail-group { margin-bottom: 1.2rem; }
        .detail-label {
            color: var(--accent-color);
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }
        .detail-text { color: #475569; font-size: 0.95rem; }

        .contact-box {
            background: #f1f5f9;
            border-left: 4px solid var(--primary-color);
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 0 8px 8px 0;
        }

        .aapi-section {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        .aapi-section h4 { color: #065f46; font-size: 1rem; margin-bottom: 0.5rem; }

        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <header>
        <h1>Aitchikh Consulting</h1>
        <p>بوابتك نحو التمويل الأمثل لمشروعك في الجزائر</p>
    </header>

    <div class="container">
        <div class="consultation-form">
            <h2 style="color: var(--primary-color); margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">أدخل معلومات مشروعك</h2>
            <form id="projectForm">
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label>💡 فكرة المشروع</label>
                        <textarea id="idea" rows="2" placeholder="أدخل وصفاً مختصراً للمشروع..." required></textarea>
                    </div>

                    <div class="input-group">
                        <label>🏗️ مجال العمل</label>
                        <select id="sector" required>
                            <option value="">-- اختر المجال --</option>
                            <option value="خدماتي">خدماتي (نقل، استشارة، صيانة)</option>
                            <option value="صناعي">صناعي / إنتاج</option>
                            <option value="فلاحي">فلاحي / تربية مواشي</option>
                            <option value="تكنولوجي">تكنولوجي / Startups</option>
                            <option value="تجاري">تجاري (بيع وشراء)</option>
                            <option value="الصحة">الصحة (عيادة، مخبر)</option>
                            <option value="البناء">البناء والأشغال العمومية BTPH</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>👥 عدد العمال</label>
                        <input type="number" id="employees" placeholder="0" required>
                    </div>

                    <div class="input-group full-width">
                        <label>💰 رأس المال المطلوب (دج)</label>
                        <input type="number" id="capital" placeholder="مثال: 5000000" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">بحث عن التمويل المناسب</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>
        </div>

        <div id="results-area">
            <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 2rem;">🏦 الجهات التمويلية المقترحة لك</h2>
            <div id="cards-wrapper" class="cards-container"></div>
        </div>
    </div>

    <footer>
        <p>© 2024 Aitchikh Consulting - Designed for Algerian Entrepreneurs</p>
    </footer>

    <script>
        // === قاعدة بيانات البنوك والوكالات الجزائرية بتفاصيل دقيقة ===
        const banksDB = {
            // البنوك
            BADR: {
                name: "بنك الفلاحة والتنمية الريفية (BADR)",
                definition: "مؤسسة مالية عمومية متخصصة في تمويل القطاع الفلاحي والصيد البحري والصناعات الغذائية.",
                conditions: "امتلاك بطاقة فلاح، عقد ملكية أو امتياز للأرض، خبرة في النشاط الفلاحي.",
                documents: "طلب خطي، بطاقة فلاح، الوثائق القانونية للأرض، دراسة تقنية من المصالح الفلاحية.",
                address: "17 شارع العقيد عميروش، الجزائر العاصمة.",
                contact: "الهاتف: 021.63.49.26 | الموقع: www.badr-bank.dz",
                aapi: "إعفاءات جمركية على استيراد العتاد الفلاحي ودعم الدولة لأسعار الفائدة."
            },
            CPA: {
                name: "القرض الشعبي الجزائري (CPA)",
                definition: "بنك تجاري عمومي يركز على تمويل المؤسسات الصغيرة والمتوسطة (PME/PMI)، المهن الحرة، والسياحة.",
                conditions: "وجود مساهمة شخصية (20-30%)، سجل تجاري، ضمانات عينية (رهن عقاري أو عتاد).",
                documents: "القانون الأساسي للشركة، الميزانية التقديرية، دراسة جدوى اقتصادية، الفواتير الشكلية.",
                address: "2 شارع العقيد عميروش، الجزائر العاصمة.",
                contact: "الهاتف: 021.63.56.12 | الموقع: www.cpa-bank.dz",
                aapi: "تخفيض بنسبة 3% من نسبة الفائدة للمشاريع السياحية والصناعية."
            },
            BDL: {
                name: "بنك التنمية المحلية (BDL)",
                definition: "بنك موجه لتمويل المهن الحرة، العيادات، والمشاريع التجارية المحلية والخدماتية.",
                conditions: "حياز محل لممارسة النشاط (ملك أو كراء)، توفر الكفاءة المهنية (الشهادة).",
                documents: "عقد الكراء/الملكية، نسخة من الديبلوم، السجل التجاري، الكشوف المالية.",
                address: "5 شارع غرمول، الجزائر العاصمة.",
                contact: "الهاتف: 021.64.66.77 | الموقع: www.bdl.dz",
                aapi: "مرافقة خاصة للاستثمارات المحلية وتسهيلات في القروض الاستغلالية."
            },
            ALSALAM: {
                name: "مصرف السلام (Al Salam Bank)",
                definition: "بنك معتمد يقدم حلول تمويل إسلامي (مرابحة، إجارة، مشاركة) متوافقة مع الشريعة.",
                conditions: "عدم وجود ديون متعثرة، هامش جدية (دفعة أولى)، توطين المداخيل.",
                documents: "ملف إداري كامل، فواتير الموردين، تعهد بتوطين الحساب.",
                address: "23 شارع دالي ابراهيم، الجزائر.",
                contact: "الهاتف: 021.38.88.88 | الموقع: www.alsalamalgeria.com",
                aapi: "الاستفادة من المزايا الجبائية (AAPI) متاحة أيضاً للتمويل الإسلامي."
            },
            BNA: {
                name: "البنك الوطني الجزائري (BNA)",
                definition: "أكبر بنك عمومي، يمول المشاريع الكبرى والصناعية ومشاريع البناء والري.",
                conditions: "ملاءة مالية جيدة، دراسة تقنية واقتصادية معمقة، ضمانات صلبة.",
                documents: "المخططات الهندسية (للبناء)، رخصة البناء، دراسة الجدوى، الكشوف البنكية.",
                address: "8 شارع شيفاني خليفة، الجزائر العاصمة.",
                contact: "الهاتف: 021.71.47.19 | الموقع: www.bna.dz",
                aapi: "فترات إعفاء (Franchise) تصل لـ 5 سنوات للمشاريع المهيكلة."
            },
            
            // الوكالات والصناديق
            ASF: {
                name: "الصندوق الوطني للمؤسسات الناشئة (ASF)",
                definition: "صندوق استثماري حكومي يمول الشركات الحاصلة على علامة 'مؤسسة ناشئة' أو 'مبتكرة'.",
                conditions: "الحصول على علامة Label Startup أو Label Projet Innovant.",
                documents: "بطاقة العلامة (Label)، خطة العمل (Pitch Deck)، الفريق المؤسس.",
                address: "الجزائر العاصمة (عبر المنصة الرقمية).",
                contact: "الموقع: www.startup.dz",
                aapi: "إعفاءات ضريبية شبه كلية، وتمويل بصيغة رأس مال مخاطر (لا توجد فوائد)."
            },
            NESDA: {
                name: "الوكالة الوطنية لدعم وتنمية المقاولاتية (NESDA)",
                definition: "جهاز دعم الدولة لإنشاء المؤسسات المصغرة (خلفاً لـ ANSEJ و CNAC).",
                conditions: "السن 18-55، بطال أو حامل فكرة، مساهمة شخصية 15%.",
                documents: "شهادة ميلاد، شهادة عدم الانتساب (CNAS/CASNOS)، فاتورة أولية، عقد كراء.",
                address: "فروع الوكالة متواجدة في كل الولايات.",
                contact: "الموقع: www.nesda.dz",
                aapi: "إعفاء من الرسم على النشاط المهني وتخفيضات ضريبية لمدة 3 سنوات."
            },
            ANGEM: {
                name: "الوكالة الوطنية للقرض المصغر (ANGEM)",
                definition: "قروض صغيرة جداً (حتى 100 مليون سنتيم) لشراء المواد الأولية للحرفيين.",
                conditions: "تأهيل مهني في الحرفة، السن فوق 18.",
                documents: "ملف إداري بسيط، بطاقة حرفي، فاتورة المواد الأولية.",
                address: "المديريات العامة عبر الولايات.",
                contact: "الموقع: www.angem.dz",
                aapi: "نظام ضريبي جزافي مبسط جداً (IFU)."
            }
        };

        // === الخوارزمية الذكية لاختيار البنك ===
        function recommendBank(sector, capital) {
            capital = Number(capital);
            let primaryRec = null;
            let secondaryRec = null;

            // 1. تحديد البنك/الجهة حسب القطاع ورأس المال
            
            // حالة: تكنولوجي وشركات ناشئة
            if (sector === 'تكنولوجي') {
                return [banksDB.ASF, banksDB.ALSALAM]; // ASF أساسي، السلام كبديل إسلامي
            }

            // حالة: فلاحي
            if (sector === 'فلاحي') {
                return [banksDB.BADR, banksDB.NESDA]; // BADR متخصص، NESDA للمشاريع الصغيرة
            }

            // حالة: الصحة (عيادات، مخابر)
            if (sector === 'الصحة') {
                return [banksDB.CPA, banksDB.BDL]; // CPA يمول التجهيزات الطبية جيداً
            }

            // حالة: البناء والأشغال العمومية
            if (sector === 'البناء') {
                return [banksDB.BNA, banksDB.CPA]; // BNA هو بنك المشاريع الكبرى
            }

            // حالة: مشاريع صغيرة جداً (أقل من 1 مليون دج) بغض النظر عن القطاع
            if (capital <= 1000000) {
                return [banksDB.ANGEM];
            }

            // حالة: مشاريع صغيرة/متوسطة (بين 1 مليون و 15 مليون دج)
            if (capital > 1000000 && capital <= 15000000) {
                if (sector === 'خدماتي' || sector === 'تجاري') {
                    primaryRec = banksDB.NESDA; // وكالة الدعم
                    secondaryRec = banksDB.BDL; // بنك التنمية المحلية مناسب للخدمات
                } else if (sector === 'صناعي') {
                    primaryRec = banksDB.NESDA;
                    secondaryRec = banksDB.CPA;
                }
            } 
            // حالة: مشاريع كبرى (أكثر من 15 مليون دج) -> توجه للبنوك مباشرة
            else {
                if (sector === 'صناعي') {
                    primaryRec = banksDB.CPA; // القرض الشعبي
                    secondaryRec = banksDB.ALSALAM; // خيار إسلامي
                } else if (sector === 'تجاري' || sector === 'خدماتي') {
                    primaryRec = banksDB.BDL;
                    secondaryRec = banksDB.ALSALAM;
                }
            }

            // تجميع النتائج
            let finalResults = [];
            if (primaryRec) finalResults.push(primaryRec);
            if (secondaryRec) finalResults.push(secondaryRec);
            
            // إضافة خيار إسلامي دائماً إذا لم يكن موجوداً (كتنويع)
            if (!finalResults.includes(banksDB.ALSALAM) && sector !== 'فلاحي' && sector !== 'تكنولوجي' && capital > 1000000) {
                finalResults.push(banksDB.ALSALAM);
            }

            return finalResults;
        }

        // === معالجة النموذج ===
        document.getElementById('projectForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const btnText = document.querySelector('.btn-text');
            const resultsArea = document.getElementById('results-area');
            const cardsWrapper = document.getElementById('cards-wrapper');
            
            const sector = document.getElementById('sector').value;
            const capital = document.getElementById('capital').value;

            // تفعيل التحميل
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            resultsArea.style.display = 'none';
            cardsWrapper.innerHTML = '';

            setTimeout(() => {
                // استدعاء الخوارزمية
                const recommendations = recommendBank(sector, capital);

                // إنشاء الكروت
                recommendations.forEach(bank => {
                    const card = document.createElement('div');
                    card.className = 'bank-card';
                    card.innerHTML = `
                        <div class="bank-header">
                            <h3>${bank.name}</h3>
                            <span class="tag">خيار موصى به</span>
                        </div>
                        <div class="bank-body">
                            <div class="detail-group">
                                <span class="detail-label">📌 التعريف:</span>
                                <p class="detail-text">${bank.definition}</p>
                            </div>
                            <div class="detail-group">
                                <span class="detail-label">📋 شروط الاستفادة:</span>
                                <p class="detail-text">${bank.conditions}</p>
                            </div>
                            <div class="detail-group">
                                <span class="detail-label">📂 الوثائق المطلوبة:</span>
                                <p class="detail-text">${bank.documents}</p>
                            </div>
                            <div class="contact-box">
                                <span class="detail-label">📍 المقر ومعلومات الاتصال:</span>
                                <p class="detail-text">${bank.address}</p>
                                <p class="detail-text" style="direction: ltr; text-align: right; margin-top:5px;">${bank.contact}</p>
                            </div>
                            <div class="aapi-section">
                                <h4>💎 امتيازات الاستثمار (AAPI)</h4>
                                <p class="detail-text">${bank.aapi}</p>
                            </div>
                        </div>
                    `;
                    cardsWrapper.appendChild(card);
                });

                // إظهار النتائج
                btn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
                resultsArea.style.display = 'block';
                resultsArea.scrollIntoView({ behavior: 'smooth' });

            }, 1500);
        });
    </script>
</body>
</html>
